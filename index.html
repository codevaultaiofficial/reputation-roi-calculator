<style>
  :root {
    --navy:#1a2f4e;

    --red:#c0392b;

    --input-bg:#ffffff;
    --card-bg:#ffffff;

  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--off-white);color:var(--text);font-family:'Open Sans',sans-serif;min-height:100vh;}

  /* TOP BAR */
  .topbar{background:var(--navy-dark);padding:10px 0;text-align:center;}
  .topbar p{font-size:12px;color:rgba(255,255,255,0.7);letter-spacing:0.05em;}
  .topbar a{color:var(--white);font-weight:600;}

  /* HEADER */
  .site-header{background:var(--navy);padding:0;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .header-inner{max-width:1000px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .header-logo img{height:40px;width:auto;}
  .header-logo-text{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:var(--white);letter-spacing:-0.02em;}
  .header-logo-text span{color:#e8b84b;}
  .header-tagline{font-size:12px;color:rgba(255,255,255,0.65);letter-spacing:0.08em;text-transform:uppercase;text-align:right;}
  .header-phone{font-size:14px;color:var(--white);font-weight:600;}

  /* HERO BANNER */
  .hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%);padding:52px 24px 44px;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(192,57,43,0.08);pointer-events:none;}
  .hero::after{content:'';position:absolute;bottom:-80px;left:-40px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none;}
  .hero-label{display:inline-block;background:var(--red);color:var(--white);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:5px 14px;border-radius:2px;margin-bottom:16px;}
  .hero h1{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:800;color:var(--white);line-height:1.15;margin-bottom:12px;}
  .hero h1 span{color:#e8b84b;}
  .hero p{font-size:15px;color:rgba(255,255,255,0.72);max-width:560px;margin:0 auto;line-height:1.7;}

  /* WRAPPER */
  .wrapper{max-width:900px;margin:0 auto;padding:36px 24px 72px;}

  /* SECTION LABEL */
  .sec-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
  .sec-label::before{content:'';width:4px;height:16px;background:var(--red);border-radius:2px;flex-shrink:0;}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* CARD */
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(26,47,78,0.06);}
  .card-title{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}

  /* FORM */
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .full{grid-column:1/-1;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);}
  input[type=text],input[type=number],select{background:var(--input-bg);border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:'Open Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;width:100%;-webkit-appearance:none;transition:border-color 0.2s,box-shadow 0.2s;}
  input:focus,select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,47,78,0.08);}

  select option{background:white;color:var(--text);}
